<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NMTI · 人格结果总览</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Noto Sans SC',-apple-system,sans-serif;background:#FAF7F2;color:#2D2D2D;padding:20px;min-height:100vh}
.wrap{max-width:1400px;margin:0 auto}
h1{font-size:24px;font-weight:900;margin-bottom:6px;letter-spacing:1px}
.sub{color:#999;font-size:13px;margin-bottom:20px;line-height:1.7}

.toolbar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.btn{background:#fff;border:1.5px solid #EBEBEB;color:#666;padding:8px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit}
.btn:hover{border-color:#D4634A;color:#D4634A}
.btn.primary{background:#D4634A;color:#fff;border-color:#D4634A}

#summary{background:#fff;border-radius:14px;padding:16px 18px;margin-bottom:20px;border:1px solid #EBEBEB;font-size:13px;color:#666;display:none}
#summary.on{display:block}
#summary h3{font-size:14px;color:#D4634A;margin-bottom:8px}
#summary ul{padding-left:20px;line-height:1.8}
#summary .hint{font-size:12px;color:#999;margin-top:10px}
.copy-text{background:#FAF7F2;padding:10px 12px;border-radius:8px;font-family:monospace;font-size:12px;margin-top:10px;border:1px dashed #ddd;user-select:all;cursor:text;word-break:break-all}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.cell{background:#fff;border-radius:16px;padding:0;box-shadow:0 2px 10px rgba(0,0,0,.04);border:1.5px solid #EBEBEB;transition:all .2s;cursor:pointer;position:relative;overflow:hidden}
.cell:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(212,99,74,.15);border-color:rgba(212,99,74,.3)}
.cell.flagged{border-color:#D4634A;border-width:2.5px;box-shadow:0 6px 20px rgba(212,99,74,.25)}
.cell .idx{position:absolute;top:10px;left:12px;font-size:11px;color:#ccc;font-weight:700;font-family:monospace;z-index:2;background:rgba(255,255,255,.85);padding:2px 6px;border-radius:4px}
.cell .flag-btn{position:absolute;top:10px;right:12px;width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.85);border:none;cursor:pointer;font-size:14px;color:#ccc;display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:2;backdrop-filter:blur(4px)}
.cell .flag-btn:hover{background:#FFE5DC;color:#D4634A}
.cell.flagged .flag-btn{background:#D4634A;color:#fff}

.card-img{width:100%;display:block;aspect-ratio:700/1050;object-fit:cover;object-position:top;background:#FAF7F2}
.meta{padding:12px 14px;background:#fff;border-top:1px solid #f2f2f2;display:flex;justify-content:space-between;align-items:center;gap:8px}
.meta .name{font-size:14px;font-weight:700;color:#2D2D2D;letter-spacing:.5px}
.meta .type{font-size:11px;padding:3px 8px;border-radius:10px;font-weight:600;letter-spacing:.3px}
.type-op{background:rgba(212,99,74,.1);color:#D4634A}
.type-win{background:rgba(200,151,90,.12);color:#C8975A}
.type-rage{background:rgba(177,74,51,.1);color:#B14A33}
.type-team{background:rgba(59,130,196,.1);color:#3B82C4}
.type-social{background:rgba(139,92,186,.1);color:#8B5CBA}

/* 点击图片放大查看 */
#modal{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;z-index:9999;padding:20px;cursor:zoom-out}
#modal.on{display:flex}
#modal img{max-width:100%;max-height:92vh;border-radius:12px;box-shadow:0 12px 40px rgba(0,0,0,.5)}
#modal .close{position:absolute;top:24px;right:24px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.2);color:#fff;border:none;font-size:20px;cursor:pointer}

@media (max-width: 600px){
  body{padding:12px}
  .grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
  h1{font-size:20px}
}
</style>
</head>
<body>
<div class="wrap">
<h1>🎨 NMTI 人格结果总览</h1>
<div class="sub">共 25 个人格，每张都是生成长图的效果预览 · 点击卡片放大查看，点击右上角 🚩 标记有问题的</div>

<div class="toolbar">
  <button class="btn primary" onclick="showSummary()">📋 生成问题清单</button>
  <button class="btn" onclick="clearAll()">清除标记</button>
  <span style="color:#999;font-size:12px;margin-left:auto"><span id="flagCount">0</span> / 25 已标记</span>
</div>

<div id="summary"></div>

<div class="grid" id="grid"></div>
</div>

<div id="modal" onclick="closeModal()">
  <button class="close" onclick="event.stopPropagation();closeModal()">×</button>
  <img id="modalImg" alt="">
</div>

<script src="personas.js?v=20260508"></script>
<script>
var TYPE_CN = {op:'操作',win:'胜负',rage:'暴躁',team:'团队',social:'社交'};
var flagged = {};
var CV = '?v=20260508'; // 缓存版本号

function render(){
  var g = document.getElementById('grid');
  var html = '';
  var idx = 1;
  Object.keys(window.PERSONAS).forEach(function(id){
    var p = window.PERSONAS[id];
    var isFlag = flagged[id] ? ' flagged':'';
    html += '<div class="cell'+isFlag+'" data-id="'+id+'" onclick="openModal(\''+id+'\')">' +
      '<span class="idx">'+String(idx).padStart(2,'0')+'</span>' +
      '<button class="flag-btn" onclick="event.stopPropagation();toggle(\''+id+'\')">🚩</button>' +
      '<img class="card-img" src="gallery_cards/'+id+'.jpg'+CV+'" alt="'+p.name+'" loading="lazy">' +
      '<div class="meta">' +
        '<span class="name">'+p.name+'</span>' +
        '<span class="type type-'+p.type+'">'+TYPE_CN[p.type]+'</span>' +
      '</div>' +
    '</div>';
    idx++;
  });
  g.innerHTML = html;
  updateCount();
}

function toggle(id){
  flagged[id] = !flagged[id];
  render();
}

function openModal(id){
  document.getElementById('modalImg').src = 'gallery_cards/'+id+'.jpg'+CV;
  document.getElementById('modal').classList.add('on');
}
function closeModal(){
  document.getElementById('modal').classList.remove('on');
}

function clearAll(){
  flagged = {};
  render();
  document.getElementById('summary').classList.remove('on');
}

function updateCount(){
  var c = Object.keys(flagged).filter(function(k){return flagged[k]}).length;
  document.getElementById('flagCount').textContent = c;
}

function showSummary(){
  var ids = Object.keys(flagged).filter(function(k){return flagged[k]});
  if(ids.length===0){
    alert('还没有标记任何人格');
    return;
  }
  var names = ids.map(function(id){return window.PERSONAS[id].name});
  var html = '<h3>🚩 有问题的人格（共 '+ids.length+' 个）</h3>' +
    '<ul>' + names.map(function(n){return '<li>'+n+'</li>'}).join('') + '</ul>' +
    '<div class="hint">把下面这串复制给我，我直接修复：</div>' +
    '<div class="copy-text">有问题的人格：'+names.join('、')+'</div>';
  var s = document.getElementById('summary');
  s.innerHTML = html;
  s.classList.add('on');
  s.scrollIntoView({behavior:'smooth'});
}

// ESC 关闭
document.addEventListener('keydown', function(e){
  if(e.key === 'Escape') closeModal();
});

render();
</script>
</body>
</html>
