<script>
// === 分级预加载：首屏体验优先 ===
// 策略：用 fetch 预热浏览器缓存，不创建 Audio 对象
// 避免"多个 Audio 元素"带来的并发播放风险
(function(){
  window.__earlyImgCache = {};

  function preloadAudio(u){
    // 纯 fetch 预热，不创建 Audio 对象（更安全，不会误触发任何播放）
    try{ fetch(u, {mode:'no-cors', credentials:'omit', cache:'force-cache'}).catch(function(){}); }catch(e){}
  }

  // L1：首屏立即需要（第3、5题）
  ['audio/yase.mp3','audio/wuzetian.mp3'].forEach(preloadAudio);

  // L2：100ms 后下载剩余题目音频（第6/7题）
  setTimeout(function(){
    ['audio/wusha.mp3','audio/sunce.mp3','audio/zhongkui.mp3',
     'audio/chengyaojin.mp3'].forEach(preloadAudio);
  }, 100);

  // L3：3 秒后 或 浏览器空闲时，才下载 25 张人格图（结果页才用得到，至少要过 15 题）
  // 注意：部分文件为绕 CDN 缓存改名为 xxx2.png，和 personas.js 里的 img 路径保持一致
  var IDS = ['aidawangzhe','bazhe','fengjinglongwang','guaidaojide2','guashazhe',
             'guyongzhe','hongbuff','hunzhe','huozhe','jiahao2',
             'jifenduobaoquan','kongdazhe','lanbuff2','liulanggou2','rongyaowangzhe',
             'shizuoyongzhe','shufuzhe2','sizhe2','toutazhe','toutoufangpizhe2',
             'tuanduizhiguang','weimuzegang','wodizhe','zhener4','zuzong2'];
  function preloadPersonas(){
    IDS.forEach(function(id){
      if(window.__earlyImgCache[id]) return;
      var img = new Image();
      img.src = 'personas/' + id + '.png?v=20260502d';
      window.__earlyImgCache[id] = img;
    });
  }
  window.__preloadPersonas = preloadPersonas;
  if(window.requestIdleCallback){
    requestIdleCallback(preloadPersonas, {timeout:3000});
  }else{
    setTimeout(preloadPersonas, 3000);
  }
})();
</script>

<script>
var Q = window.QUESTIONS;
var cq=0, ans=new Array(Q.length).fill(null), ht=null;
var optPlaying=false;
var isSecondRound=false; // 第15题D是否已经触发过重置

// === 注册 Service Worker（离线缓存所有资源）===
if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}

function go(){
  document.getElementById('start').style.display='none';
  document.getElementById('nv').classList.add('sh');
  cq=0; ans=new Array(Q.length).fill(null);
  // 用户开始答题 = 立刻触发人格图下载
  if(window.__preloadPersonas) window.__preloadPersonas();
  // iOS 音频解锁：在用户手势链内对全局 Audio 做一次 play+pause（用 data URL 静音帧，不影响真实音频）
  unlockAudio();
  rdr();
}

// ========== 音频系统（全局唯一对象 + token 防并发）==========
// 设计原则：
// 1. 整个 APP 只用一个 Audio 对象（audioEl），彻底杜绝多元素并发播放
// 2. 每次调 playAudio 递增 audioToken，旧的 onended/ontimeupdate 回调看到 token 不匹配直接退出
// 3. stp() 真正彻底停止：pause + 清回调 + token++
// 4. 预加载只用 fetch，不创建 Audio 对象，没有"多个 Audio 意外同时播"的可能
var audioEl = null;
var audioToken = 0;
var audioUnlocked = false;

function getGlobalAudio(){
  if(!audioEl){
    audioEl = new Audio();
    audioEl.preload = 'auto';
  }
  return audioEl;
}

// 用 1 帧静音 mp3 解锁 iOS 音频权限（同步在手势链内）
function unlockAudio(){
  if(audioUnlocked) return;
  audioUnlocked = true;
  try{
    var el = getGlobalAudio();
    var unlockToken = ++audioToken;
    el.src = 'data:audio/mp3;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4Ljc2LjEwMAAAAAAAAAAAAAAA//tQxAADB8AhSmxhIIEVCSiJrDCQBTcu3UrAIwUdkRgQbFAZC1CQEwTJ9mjRvBA4UOLD8nKVOWfh+UlK3z/177OXrfOdKl7pyn3Xf//FJAhD2Lcn';
    el.volume = 0;
    var p = el.play();
    if(p && p.then) p.then(function(){
      // 如果期间有新音频被 playAudio 启动，unlockToken 已失效，什么都别做
      if(unlockToken !== audioToken) return;
      try{ el.pause(); el.currentTime=0; el.volume=1; }catch(e){}
    }).catch(function(){});
  }catch(e){}
}

function stp(){
  audioToken++;
  if(audioEl){
    try{
      audioEl.pause();
      audioEl.ontimeupdate = null;
      audioEl.onended = null;
      audioEl.volume = 1;
    }catch(e){}
  }
  optPlaying = false;
}

function playAudio(src, onEndCb, onTickCb){
  stp();
  var myToken = ++audioToken;
  var el = getGlobalAudio();
  try{ el.pause(); el.currentTime = 0; }catch(e){}
  el.volume = 1;
  el.src = src;
  if(onTickCb){
    el.ontimeupdate = function(){
      if(myToken !== audioToken) { el.ontimeupdate = null; return; }
      onTickCb(el);
    };
  }
  if(onEndCb){
    el.onended = function(){
      if(myToken !== audioToken) return;
      el.onended = null;
      onEndCb();
    };
  }
  var p = el.play();
  if(p && p.then) p.catch(function(){});
  return myToken;
}
// ========================================================

// === 全局预加载：页面打开就开始悄悄下载所有 persona 图 ===
var personaImgCache = {};
function preloadAllPersonaImages(){
  // 早期已下载，直接复用
  if(window.__earlyImgCache){
    Object.keys(window.__earlyImgCache).forEach(function(id){
      personaImgCache[id] = window.__earlyImgCache[id];
    });
    return;
  }
  // 兜底路径（旧浏览器或早期脚本没执行）
  if(!window.PERSONAS) return;
  Object.keys(window.PERSONAS).forEach(function(id){
    if(personaImgCache[id]) return;
    var img = new Image();
    var p = window.PERSONAS[id];
    img.src = (p && p.img) ? (p.img + '?v=20260502d') : ('personas/' + id + '.png?v=20260502d');
    personaImgCache[id] = img;
  });
}
// 页面脚本加载完就立即启动（此时早期图片已在下载中）
preloadAllPersonaImages();

function rdr(){

// === 结果页渲染 ===
// 数据卡随机数规则：按主导维度类型(type)分 5 档
// - op 操作: 连胜 10-20 (80% 落 10-15 / 20% 落 15-20), 举报 0-10
// - win 胜负: 连胜 5-30 (80% 落 5-15 / 20% 落 15-30), 举报 5-10
// - team 团队: 连胜 2-7, 举报 0-5
// - social 社交: 连胜 0-5, 举报 5-15
// - rage 暴躁: 连胜 2-5, 举报 50-1000 (80% 落 50-100 / 15% 落 100-500 / 5% 落 900-1000)
function rndInt(min,max){return Math.floor(Math.random()*(max-min+1))+min}
// 分段随机：buckets=[[min,max,prob],...], prob 总和=1
function rndBucket(buckets){
  var r = Math.random();
  var acc = 0;
  for(var i=0;i<buckets.length;i++){
    acc += buckets[i][2];
    if(r < acc) return rndInt(buckets[i][0], buckets[i][1]);
  }
  var last = buckets[buckets.length-1];
  return rndInt(last[0], last[1]);
}
function rollWin(type){
  switch(type){
    case 'op':     return rndBucket([[10,15,0.8],[15,20,0.2]]);
    case 'win':    return rndBucket([[5,15,0.8],[15,30,0.2]]);
    case 'team':   return rndInt(2,7);
    case 'social': return rndInt(0,5);
    case 'rage':   return rndInt(2,5);
    default:       return rndInt(10,15);
  }
}
function rollReport(type){
  switch(type){
    case 'op':     return rndInt(0,10);
    case 'win':    return rndInt(5,10);
    case 'team':   return rndInt(0,5);
    case 'social': return rndInt(5,15);
    case 'rage':   return rndBucket([[50,100,0.8],[100,500,0.15],[900,1000,0.05]]);
    default:       return rndInt(0,10);
  }
}

// === 截图功能 ===
// 把页面里的 img src 替换成 data URL，避免 html2canvas 因 CORS 输出白图
// 用两种策略：先试 fetch(blob→dataURL)，失败再用 canvas 临时画一遍读 dataURL
function imgToDataURL(src){
  return new Promise(function(resolve){
    // 策略 A：fetch
    var done = false;
    function finish(result){
      if(done) return;
      done = true;
      resolve(result || null);
    }
    try{
      fetch(src, {cache:'force-cache'})
        .then(function(r){
          if(!r.ok) throw new Error('bad status');
          return r.blob();
        })
        .then(function(blob){
          var fr = new FileReader();
          fr.onload = function(){ finish(fr.result); };
          fr.onerror = function(){ finish(null); };
          fr.readAsDataURL(blob);
        })
        .catch(function(){ finish(null); });
    }catch(e){ finish(null); }
    // 5 秒兜底
    setTimeout(function(){ finish(null); }, 5000);
  });
}

function inlineImagesAsDataURL(root){
  var imgs = root.querySelectorAll('img[src]');
  var tasks = [];
  for(var i=0;i<imgs.length;i++){
    (function(img){
      var src = img.getAttribute('src');
      if(!src || src.indexOf('data:')===0) return;
      tasks.push(
        imgToDataURL(src).then(function(dataUrl){
          if(dataUrl) img.setAttribute('src', dataUrl);
          // 失败就保持原 src（html2canvas 可能仍能用，失败也不致命）
        })
      );
    })(imgs[i]);
  }
  return Promise.all(tasks);
}

function saveAsImage(){
  var page = document.getElementById('res');
  var btnRow = document.querySelector('.btn-row');
  var footer = document.querySelector('.footer');
  var nmEl = page.querySelector('.lead .nm');

  if(btnRow) btnRow.style.visibility='hidden';
  if(footer) footer.style.visibility='hidden';

  // 移除所有 position:fixed 浮层（彻底杜绝 html2canvas 把白雾渲染进画布）
  var floatingEls = [
    document.getElementById('saveMask'),
    document.getElementById('imgModal'),
    document.getElementById('daji-toast'),
    document.getElementById('easter-toast'),
    document.getElementById('nv')  // ← 底部导航也是 position:fixed，之前漏了
  ].filter(Boolean);
  var floatingHolder = document.createElement('div');
  floatingHolder.style.cssText = 'position:fixed;left:-99999px;top:-99999px;width:1px;height:1px;overflow:hidden';
  var floatingParents = floatingEls.map(function(el){ return [el, el.parentNode, el.nextSibling]; });
  floatingEls.forEach(function(el){ floatingHolder.appendChild(el); });
  document.body.appendChild(floatingHolder);

  // 临时 spinner（反馈用户正在生成）
  var tmpMask = document.createElement('div');
  tmpMask.id = '__tmpSaveMask';
  tmpMask.style.cssText = 'position:fixed;inset:0;background:rgba(255,255,255,.88);display:flex;align-items:center;justify-content:center;z-index:99999;flex-direction:column;gap:14px;font-size:13px;color:#666';
  tmpMask.innerHTML = '<div style="width:36px;height:36px;border:3px solid #eee;border-top-color:#D4634A;border-radius:50%;animation:spin 1s linear infinite"></div><div>正在生成长图…</div><style>@keyframes spin{to{transform:rotate(360deg)}}</style>';
  document.body.appendChild(tmpMask);

  // html2canvas 对 background-clip:text 支持不好，临时换成纯色
  var nmStyleBackup = null;
  if(nmEl){
    nmStyleBackup = nmEl.getAttribute('style') || '';
    nmEl.setAttribute('style', nmStyleBackup +
      ';background:none !important;-webkit-background-clip:initial !important;background-clip:initial !important;-webkit-text-fill-color:#D4634A !important;color:#D4634A !important');
  }

  // 备份原 img src
  var originalSrcs = [];
  var imgNodes = page.querySelectorAll('img[src]');
  for(var i=0;i<imgNodes.length;i++){
    originalSrcs.push([imgNodes[i], imgNodes[i].getAttribute('src')]);
  }
  function restoreImgs(){
    originalSrcs.forEach(function(pair){ pair[0].setAttribute('src', pair[1]); });
  }

  function cleanup(){
    if(btnRow) btnRow.style.visibility='';
    if(footer) footer.style.visibility='';
    if(nmEl) nmEl.setAttribute('style', nmStyleBackup);
    floatingParents.forEach(function(rec){
      var el = rec[0], parent = rec[1], next = rec[2];
      if(parent) parent.insertBefore(el, next);
    });
    if(floatingHolder.parentNode) floatingHolder.parentNode.removeChild(floatingHolder);
    if(tmpMask.parentNode) tmpMask.parentNode.removeChild(tmpMask);
    restoreImgs();
  }

  inlineImagesAsDataURL(page).then(function(){
    // 等所有 img 的 src 切换后的新图片加载完
    var imgs2 = page.querySelectorAll('img[src]');
    var waits = [];
    for(var j=0;j<imgs2.length;j++){
      var im = imgs2[j];
      if(im.complete && im.naturalWidth>0) continue;
      waits.push(new Promise(function(res){
        im.addEventListener('load', res, {once:true});
        im.addEventListener('error', res, {once:true});
        setTimeout(res, 3000);
      }));
    }
    return Promise.all(waits);
  }).then(function(){
    return new Promise(function(res){ requestAnimationFrame(res); });
  }).then(function(){
    return html2canvas(page, {
      backgroundColor:'#FAF7F2', scale:1.5, logging:false,
      allowTaint:true, useCORS:false, imageTimeout:0,
      ignoreElements: function(el){
        if(!el) return false;
        var id = el.id || '';
        var cls = (el.className && typeof el.className === 'string') ? el.className : '';
        if(id === 'saveMask' || id === 'imgModal' || id === 'daji-toast' || id === 'easter-toast' || id === '__tmpSaveMask' || id === 'nv') return true;
        if(cls.indexOf('btn-row') >= 0 || cls === 'footer' || cls === 'nav' || cls.indexOf('nav ')>=0) return true;
        return false;
      }
    });
  }).then(function(canvas){
    cleanup();
    var dataUrl;
    try{
      dataUrl = canvas.toDataURL('image/jpeg', 0.92);
    }catch(e){
      // canvas 被污染时 toDataURL 会抛，降级用 toBlob + createObjectURL
      return new Promise(function(res){
        canvas.toBlob(function(blob){
          if(blob){ res(URL.createObjectURL(blob)); }
          else { res(null); }
        }, 'image/jpeg', 0.92);
      }).then(function(url){
        if(!url){ alert('截图因浏览器安全策略无法生成，请截屏保存'); return; }
        document.getElementById('mimg').src = url;
        document.getElementById('imgModal').classList.add('on');
      });
    }
    document.getElementById('mimg').src = dataUrl;
    document.getElementById('imgModal').classList.add('on');
  }).catch(function(e){
    cleanup();
    alert('生成失败：'+(e.message||e));
  });
}
function closeImgModal(){
  document.getElementById('imgModal').classList.remove('on');
}
</script>
