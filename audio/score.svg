<svg xmlns="http://www.w3.org/2000/svg" width="520" height="160" viewBox="0 0 520 160">
  <rect width="520" height="160" fill="none"/>
  
  <!-- 五线 -->
  <line x1="30" y1="50" x2="490" y2="50" stroke="#555" stroke-width="1"/>
  <line x1="30" y1="66" x2="490" y2="66" stroke="#555" stroke-width="1"/>
  <line x1="30" y1="82" x2="490" y2="82" stroke="#555" stroke-width="1"/>
  <line x1="30" y1="98" x2="490" y2="98" stroke="#555" stroke-width="1"/>
  <line x1="30" y1="114" x2="490" y2="114" stroke="#555" stroke-width="1"/>
  
  <!-- 高音谱号 (简化手绘路径) -->
  <text x="38" y="105" font-family="serif" font-size="68" fill="#444">&#119070;</text>
  
  <!-- 音符: F4 F4 F4 E4 F4 -->
  <!-- F4 = 第1间 = y=106 (第4线98和第5线114之间) -->
  <!-- E4 = 第5线 = y=114 (最下面的线上) -->
  
  <!-- 音符1: F4 -->
  <ellipse cx="160" cy="106" rx="8" ry="6" fill="#333" transform="rotate(-15 160 106)"/>
  <line x1="167" y1="106" x2="167" y2="68" stroke="#333" stroke-width="1.8"/>
  
  <!-- 音符2: F4 -->
  <ellipse cx="235" cy="106" rx="8" ry="6" fill="#333" transform="rotate(-15 235 106)"/>
  <line x1="242" y1="106" x2="242" y2="68" stroke="#333" stroke-width="1.8"/>
  
  <!-- 音符3: F4 -->
  <ellipse cx="310" cy="106" rx="8" ry="6" fill="#333" transform="rotate(-15 310 106)"/>
  <line x1="317" y1="106" x2="317" y2="68" stroke="#333" stroke-width="1.8"/>
  
  <!-- 音符4: E4 (在第5线上) -->
  <ellipse cx="370" cy="114" rx="8" ry="6" fill="#333" transform="rotate(-15 370 114)"/>
  <line x1="377" y1="114" x2="377" y2="76" stroke="#333" stroke-width="1.8"/>
  
  <!-- 音符5: F4 -->
  <ellipse cx="440" cy="106" rx="8" ry="6" fill="#333" transform="rotate(-15 440 106)"/>
  <line x1="447" y1="106" x2="447" y2="68" stroke="#333" stroke-width="1.8"/>
</svg>